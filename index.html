<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Seat - Catálogo 360°</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: pan-y; /* Permite scroll vertical pero bloquea el horizontal para el giro */
        }
        .header {
            text-align: center;
            padding: 20px;
            width: 100%;
        }
        .header h1 { color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; }
        
        .instructions {
            color: var(--gold);
            font-size: 13px;
            margin: 10px 0;
            font-style: italic;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .viewer-container {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        #viewer-img {
            width: 100%;
            display: block;
            border-radius: 15px;
            user-select: none;
            -webkit-user-drag: none;
        }

        .details-card {
            width: 85%;
            max-width: 430px;
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border-left: 4px solid var(--gold);
            border-radius: 8px;
        }
        .details-card h2 { margin: 0 0 10px 0; font-size: 18px; color: var(--gold); }
        .details-card p { font-size: 14px; color: #ccc; line-height: 1.5; margin: 5px 0; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin: 25px 0 40px 0;
            width: 90%;
            max-width: 450px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-fill {
            background: var(--gold);
            color: black;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LUXURY SEAT</h1>
        <p>Catálogo Interactivo 360°</p>
    </div>

    <div class="instructions">↔️ Desliza para girar el diseño ↔️</div>

    <div class="viewer-container" id="viewer-box">
        <img id="viewer-img" src="1.png" alt="Diseño Luxury Seat">
    </div>

    <div class="details-card">
        <h2>Asiento Suzuki - Edición Carbon</h2>
        <p><strong>Material:</strong> Sintético tipo Carbono + Gamuza Antideslizante.</p>
        <p><strong>Detalle:</strong> Costuras reforzadas en azul vibrante.</p>
        <p><strong>Personalización:</strong> Logo bordado en alta densidad.</p>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="location.reload()">Siguiente Diseño</button>
        <button class="btn btn-fill">Cotizar Ahora</button>
    </div>

    <script>
        // Array con los nombres de tus archivos del 1 al 4
        const images = ["1.png", "2.png", "3.png", "4.png"];
        
        let currentIndex = 0;
        let isDragging = false;
        let startX = 0;
        
        const imgElement = document.getElementById('viewer-img');
        const viewerBox = document.getElementById('viewer-box');

        // Función para actualizar la imagen según el índice
        function updateImage(index) {
            imgElement.src = images[index];
        }

        // --- Lógica para Mouse ---
        viewerBox.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX;
            viewerBox.style.cursor = 'grabbing';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            viewerBox.style.cursor = 'grab';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const x = e.pageX;
            const walk = startX - x;
            
            // Sensibilidad: cada 30 pixeles de movimiento cambia la foto
            if (Math.abs(walk) > 30) {
                if (walk > 0) {
                    currentIndex = (currentIndex + 1) % images.length;
                } else {
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                }
                updateImage(currentIndex);
                startX = x;
            }
        });

        // --- Lógica para Pantallas Táctiles (Celular) ---
        viewerBox.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].pageX;
        });

        viewerBox.addEventListener('touchend', () => {
            isDragging = false;
        });

        viewerBox.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            
            const x = e.touches[0].pageX;
            const walk = startX - x;
            
            if (Math.abs(walk) > 25) { // Un poco más sensible en móvil
                if (walk > 0) {
                    currentIndex = (currentIndex + 1) % images.length;
                } else {
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                }
                updateImage(currentIndex);
                startX = x;
            }
        });
    </script>
</body>
</html>
